<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="근무기록">
<title>근무기록</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#111;--card:#1C1C1E;--line:#2C2C2E;
  --text:#F2F2F7;--sub:#8E8E93;
  --green:#30D158;--orange:#FF9F0A;--red:#FF453A;--blue:#5E8BFF;
  --gbg:rgba(48,209,88,0.13);--obg:rgba(255,159,10,0.13);--rbg:rgba(255,69,58,0.13);
}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  max-width:430px;margin:0 auto;min-height:100vh;
  padding-bottom:80px;
  padding-top:env(safe-area-inset-top);
}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px;}
.topbar h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.segs{display:flex;gap:7px;padding:0 18px 12px;}
.seg{display:flex;background:var(--card);border-radius:9px;padding:3px;flex:1;}
.seg-btn{flex:1;padding:7px 0;border:none;border-radius:6px;background:transparent;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.seg-btn.on{background:var(--line);color:var(--text);}
.mnav{display:flex;align-items:center;justify-content:space-between;padding:0 18px 10px;}
.mnav button{background:var(--card);border:none;color:var(--text);width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mnav button:active{opacity:0.5;}
.mnav .mt{font-size:19px;font-weight:700;letter-spacing:-0.3px;}
.cal{padding:0 10px;}
.dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.dow span{text-align:center;font-size:11px;font-weight:600;color:var(--sub);padding:3px 0;}
.dow span:first-child{color:rgba(255,69,58,0.7);}
.dow span:last-child{color:rgba(94,139,255,0.7);}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dc{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;background:var(--card);transition:transform 0.08s;user-select:none;}
.dc:active{transform:scale(0.88);}
.dc.empty{background:transparent;cursor:default;pointer-events:none;}
.dc .dn{font-size:13px;font-weight:600;color:var(--sub);line-height:1;}
.dc.sun .dn{color:rgba(255,69,58,0.4);}
.dc.sat .dn{color:rgba(94,139,255,0.4);}
.dc .dbadge{font-size:8px;font-weight:700;line-height:1;}
.dc.sw{background:var(--gbg);} .dc.sw .dn{color:var(--green);}
.dc.so{background:var(--obg);} .dc.so .dn{color:var(--orange);}
.dc.ss{background:var(--rbg);} .dc.ss .dn{color:var(--red);}
.dc.tod .dn{background:var(--text);color:var(--bg) !important;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.chips{display:flex;gap:6px;padding:10px 10px 0;overflow-x:auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;display:flex;align-items:center;gap:5px;background:var(--card);border-radius:20px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--sub);}
.chip b{margin-left:2px;}
.pcard{margin:14px 10px 0;background:var(--card);border-radius:16px;overflow:hidden;}
.ptop{padding:16px 18px 12px;border-bottom:1px solid var(--line);}
.plabel{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--sub);margin-bottom:5px;}
.pamount{font-size:34px;font-weight:800;letter-spacing:-1.5px;}
.pamount span{font-size:15px;font-weight:500;color:var(--sub);margin-left:2px;}
.pnote{font-size:11px;color:var(--sub);margin-top:3px;}
.prows{padding:2px 0;}
.prow{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;font-size:13px;}
.prow+.prow{border-top:1px solid var(--line);}
.prow .pl{color:var(--sub);}
.prow .pv{font-weight:700;}
.sbg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.18s;}
.sbg.open{opacity:1;pointer-events:all;}
.sheet{width:100%;max-width:430px;background:#1C1C1E;border-radius:22px 22px 0 0;padding:0 0 40px;transform:translateY(100%);transition:transform 0.25s cubic-bezier(0.32,0.72,0,1);padding-bottom:max(40px,env(safe-area-inset-bottom));}
.sbg.open .sheet{transform:translateY(0);}
.shandle{width:36px;height:4px;border-radius:2px;background:var(--line);margin:12px auto 0;}
.shead{padding:14px 20px 12px;border-bottom:1px solid var(--line);}
.shead .sd{font-size:18px;font-weight:700;}
.shead .sdow{font-size:12px;color:var(--sub);margin-top:2px;}
.citems{padding:4px 0;}
.ci{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;cursor:pointer;}
.ci:active{background:rgba(255,255,255,0.03);}
.ci+.ci{border-top:1px solid var(--line);}
.ci-l{display:flex;align-items:center;gap:12px;}
.ci-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.ci-name{font-size:15px;font-weight:600;}
.ci-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.sw{width:50px;height:30px;border-radius:15px;background:var(--line);position:relative;transition:background 0.18s;flex-shrink:0;}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform 0.18s;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.sw.g{background:var(--green);} .sw.o{background:var(--orange);} .sw.r{background:var(--red);}
.sw.g::after,.sw.o::after,.sw.r::after{transform:translateX(20px);}
.sclose{margin:14px 20px 0;width:calc(100% - 40px);padding:15px;background:var(--line);border:none;border-radius:14px;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;}
.sclose:active{opacity:0.6;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#2C2C2E;color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:100;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="topbar"><h1>근무기록</h1></div>

<div class="segs">
  <div class="seg">
    <button class="seg-btn on" onclick="setCfg('gender','male',this)">남자</button>
    <button class="seg-btn" onclick="setCfg('gender','female',this)">여자</button>
  </div>
  <div class="seg">
    <button class="seg-btn on" onclick="setCfg('prob','prob',this)">수습중</button>
    <button class="seg-btn" onclick="setCfg('prob','full',this)">수습완료</button>
  </div>
</div>

<div class="mnav">
  <button onclick="changeMonth(-1)">‹</button>
  <span class="mt" id="mt"></span>
  <button onclick="changeMonth(1)">›</button>
</div>

<div class="cal">
  <div class="dow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
  <div class="cgrid" id="cgrid"></div>
</div>

<div class="chips">
  <div class="chip" style="color:var(--green)">출근 <b id="cW">0</b>일</div>
  <div class="chip" style="color:var(--orange)">잔업 <b id="cO">0</b>일</div>
  <div class="chip" style="color:var(--red)">특근 <b id="cS">0</b>일</div>
  <div class="chip">주휴 <b id="cWH">0</b>주</div>
</div>

<div class="pcard">
  <div class="ptop">
    <div class="plabel">이달 예상 급여</div>
    <div class="pamount" id="pamount">0<span>원</span></div>
    <div class="pnote" id="pnote"></div>
  </div>
  <div class="prows">
    <div class="prow"><span class="pl">기본급</span><span class="pv" style="color:var(--green)" id="pBase">—</span></div>
    <div class="prow"><span class="pl">주휴수당</span><span class="pv" style="color:var(--green)" id="pWeekly">—</span></div>
    <div class="prow"><span class="pl">잔업수당 <small style="font-weight:400;opacity:.6">× 1.5 × 2.5h</small></span><span class="pv" style="color:var(--orange)" id="pOT">—</span></div>
    <div class="prow"><span class="pl">특근수당 <small style="font-weight:400;opacity:.6">× 1.5 × 8h</small></span><span class="pv" style="color:var(--red)" id="pSP">—</span></div>
  </div>
</div>

<div class="sbg" id="sbg" onclick="bgTap(event)">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="shead">
      <div class="sd" id="sd"></div>
      <div class="sdow" id="sdow"></div>
    </div>
    <div class="citems">
      <div class="ci" onclick="tog('work')">
        <div class="ci-l">
          <div class="ci-icon" style="background:var(--gbg)">🟢</div>
          <div><div class="ci-name">출근</div><div class="ci-sub">기본 8시간</div></div>
        </div>
        <div class="sw" id="sw-work"></div>
      </div>
      <div class="ci" onclick="tog('ot')">
        <div class="ci-l">
          <div class="ci-icon" style="background:var(--obg)">🟠</div>
          <div><div class="ci-name">잔업</div><div class="ci-sub">+2.5시간 고정</div></div>
        </div>
        <div class="sw" id="sw-ot"></div>
      </div>
      <div class="ci" onclick="tog('special')">
        <div class="ci-l">
          <div class="ci-icon" style="background:var(--rbg)">🔴</div>
          <div><div class="ci-name">특근</div><div class="ci-sub">휴일 근무 (시급 × 1.5 × 8h)</div></div>
        </div>
        <div class="sw" id="sw-special"></div>
      </div>
    </div>
    <button class="sclose" onclick="closeSheet()">확인</button>
  </div>
</div>

<div class="toast" id="toast">저장됨 ✓</div>

<script>
const OT_H=2.5, BASE_H=8;
const DOW_KR=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const MON_KR=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const STORAGE_KEY='wage_v2';

let cfg={gender:'male',prob:'prob'};
let days={};
let activeDate=null;
const today=new Date();
let cy=today.getFullYear(), cm=today.getMonth();

// ── 6월 기본 데이터 ──────────────────────────────────
const JUNE_DEFAULTS = {
  // 특근 (토요일 휴일근무)
  '2026-06-03': {work:true, ot:false, special:true},
  '2026-06-13': {work:true, ot:false, special:true},
  '2026-06-20': {work:true, ot:false, special:true},
  '2026-06-27': {work:true, ot:false, special:true},
  // 잔업
  '2026-06-02': {work:true, ot:true,  special:false},
  '2026-06-04': {work:true, ot:true,  special:false},
  '2026-06-08': {work:true, ot:true,  special:false},
  '2026-06-09': {work:true, ot:true,  special:false},
  '2026-06-10': {work:true, ot:true,  special:false},
  '2026-06-11': {work:true, ot:true,  special:false},
  '2026-06-15': {work:true, ot:true,  special:false},
  '2026-06-16': {work:true, ot:true,  special:false},
  '2026-06-18': {work:true, ot:true,  special:false},
  '2026-06-22': {work:true, ot:true,  special:false},
  '2026-06-23': {work:true, ot:true,  special:false},
  '2026-06-24': {work:true, ot:true,  special:false},
  '2026-06-29': {work:true, ot:true,  special:false},
  '2026-06-30': {work:true, ot:true,  special:false},
  // 출근만
  '2026-06-01': {work:true, ot:false, special:false},
  '2026-06-05': {work:true, ot:false, special:false},
  '2026-06-12': {work:true, ot:false, special:false},
  '2026-06-17': {work:true, ot:false, special:false},
  '2026-06-19': {work:true, ot:false, special:false},
  '2026-06-25': {work:true, ot:false, special:false},
  '2026-06-26': {work:true, ot:false, special:false},
};

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({cfg,days}));
  showToast();
}
function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      if(d.cfg) cfg=d.cfg;
      if(d.days) days=d.days;
      restoreSegs();
    } else {
      // 첫 실행 시 6월 기본값 주입
      days={...JUNE_DEFAULTS};
      localStorage.setItem(STORAGE_KEY, JSON.stringify({cfg,days}));
    }
  }catch(e){
    days={...JUNE_DEFAULTS};
  }
}
function restoreSegs(){
  document.querySelectorAll('.seg').forEach((seg,i)=>{
    const key=i===0?'gender':'prob';
    seg.querySelectorAll('.seg-btn').forEach(btn=>{
      const match = key==='gender'?(cfg[key]==='male'?'남자':'여자'):(cfg[key]==='prob'?'수습중':'수습완료');
      btn.classList.toggle('on', btn.textContent===match);
    });
  });
}
function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}
function hourly(){
  if(cfg.prob==='prob') return 10350;
  return cfg.gender==='male'?10500:10350;
}
function render(){
  document.getElementById('mt').textContent=`${cy}년 ${MON_KR[cm]}`;
  const grid=document.getElementById('cgrid');
  grid.innerHTML='';
  const firstDow=new Date(cy,cm,1).getDay();
  const dim=new Date(cy,cm+1,0).getDate();
  for(let i=0;i<firstDow;i++){
    const e=document.createElement('div');
    e.className='dc empty';
    grid.appendChild(e);
  }
  for(let d=1;d<=dim;d++){
    const ds=dstr(cy,cm+1,d);
    const dow=new Date(cy,cm,d).getDay();
    const info=days[ds]||{};
    const isToday=cy===today.getFullYear()&&cm===today.getMonth()&&d===today.getDate();
    let cls='dc';
    if(dow===0) cls+=' sun';
    if(dow===6) cls+=' sat';
    if(isToday) cls+=' tod';
    if(info.special) cls+=' ss';
    else if(info.ot) cls+=' so';
    else if(info.work) cls+=' sw';
    const badgeText=info.special?'특근':info.ot?'잔업':info.work?'출근':'ㅤ';
    const badgeColor=info.special?'var(--red)':info.ot?'var(--orange)':info.work?'var(--green)':'transparent';
    const cell=document.createElement('div');
    cell.className=cls;
    cell.innerHTML=`<span class="dn">${d}</span><span class="dbadge" style="color:${badgeColor}">${badgeText}</span>`;
    cell.addEventListener('click',()=>openSheet(ds,d,dow));
    grid.appendChild(cell);
  }
  calcPay();
}
function calcPay(){
  const h=hourly();
  const dim=new Date(cy,cm+1,0).getDate();
  let wDays=0,otDays=0,spDays=0;
  const wkMap={};
  for(let d=1;d<=dim;d++){
    const info=days[dstr(cy,cm+1,d)]||{};
    const wk=weekKey(new Date(cy,cm,d));
    if(!wkMap[wk]) wkMap[wk]=0;
    if(info.special){spDays++;wkMap[wk]+=BASE_H;}
    else if(info.work){wDays++;wkMap[wk]+=BASE_H;if(info.ot)otDays++;}
  }
  const weekCount=Object.values(wkMap).filter(v=>v>=15).length;
  const base=Math.round(h*BASE_H*wDays);
  const weekly=Math.round(h*BASE_H*weekCount);
  const ot=Math.round(h*1.5*OT_H*otDays);
  const sp=Math.round(h*1.5*BASE_H*spDays);
  const total=base+weekly+ot+sp;
  document.getElementById('pamount').innerHTML=fmt(total)+'<span>원</span>';
  document.getElementById('pnote').textContent=`시급 ${fmt(h)}원 · 출근 ${wDays}일`;
  document.getElementById('pBase').textContent=fmt(base)+'원';
  document.getElementById('pWeekly').textContent=weekCount>0?`${fmt(weekly)}원 (${weekCount}주)`:'해당없음';
  document.getElementById('pOT').textContent=otDays>0?`${fmt(ot)}원 (${otDays}일)`:'없음';
  document.getElementById('pSP').textContent=spDays>0?`${fmt(sp)}원 (${spDays}일)`:'없음';
  document.getElementById('cW').textContent=wDays;
  document.getElementById('cO').textContent=otDays;
  document.getElementById('cS').textContent=spDays;
  document.getElementById('cWH').textContent=weekCount;
}
function openSheet(ds,d,dow){
  activeDate=ds;
  const info=days[ds]||{};
  document.getElementById('sd').textContent=`${cy}년 ${cm+1}월 ${d}일`;
  document.getElementById('sdow').textContent=DOW_KR[dow];
  setSw('work',!!info.work,'g');
  setSw('ot',!!info.ot,'o');
  setSw('special',!!info.special,'r');
  document.getElementById('sbg').classList.add('open');
}
function closeSheet(){
  document.getElementById('sbg').classList.remove('open');
  render();
  save();
}
function bgTap(e){if(e.target===document.getElementById('sbg'))closeSheet();}
function tog(type){
  if(!activeDate)return;
  if(!days[activeDate])days[activeDate]={};
  const info=days[activeDate];
  if(type==='work'){
    info.work=!info.work;
    if(!info.work){info.ot=false;info.special=false;}
  }else if(type==='ot'){
    if(!info.ot){info.work=true;info.special=false;}
    info.ot=!info.ot;
  }else if(type==='special'){
    if(!info.special){info.work=true;info.ot=false;}
    info.special=!info.special;
  }
  if(!info.work&&!info.ot&&!info.special)delete days[activeDate];
  const cur=days[activeDate]||{};
  setSw('work',!!cur.work,'g');
  setSw('ot',!!cur.ot,'o');
  setSw('special',!!cur.special,'r');
  calcPay();
}
function setSw(id,on,cls){
  document.getElementById('sw-'+id).className='sw'+(on?' '+cls:'');
}
function setCfg(key,val,el){
  cfg[key]=val;
  el.parentNode.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  calcPay();
  save();
}
function changeMonth(dir){
  cm+=dir;if(cm>11){cm=0;cy++;}if(cm<0){cm=11;cy--;}render();
}
function dstr(y,m,d){
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function weekKey(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const day=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-day);
  const y1=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return `${d.getUTCFullYear()}-W${Math.ceil(((d-y1)/86400000+1)/7)}`;
}
function fmt(n){return n.toLocaleString('ko-KR');}

load();
render();
</script>
</body>
</html>
